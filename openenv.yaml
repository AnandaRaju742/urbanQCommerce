spec_version: 1
name: urban_q_commerce
type: space
runtime: fastapi
app: server.app:app
port: 8000

tasks:
  - id: easy-static-routing
    difficulty: easy
    max_steps: 50
    config:
      task_level: easy
      rate_multiplier: 1
    grader:
      type: python
      entrypoint: server.urban_q_commerce_environment:compute_score

  - id: medium-dynamic-attrition
    difficulty: medium
    max_steps: 50
    config:
      task_level: medium
      rate_multiplier: 2
    grader:
      type: python
      entrypoint: server.urban_q_commerce_environment:compute_score

  - id: hard-surge-mitigation
    difficulty: hard
    max_steps: 50
    config:
      task_level: hard
      rate_multiplier: 4
    grader:
      type: python
      entrypoint: server.urban_q_commerce_environment:compute_score